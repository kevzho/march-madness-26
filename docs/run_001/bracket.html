<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bracket • March Madness Run</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="bg"></div>
    <header class="header">
      <div class="container header__inner">
        <div>
          <div class="kicker">March Madness • Elo Pipeline</div>
          <h1 class="title">Bracket</h1>
          <div class="subtle" id="runMeta">Loading…</div>
        </div>
	        <div class="header__actions">
	          <div class="runRow">
	            <label class="field">
	              <span class="field__label">Run</span>
	              <select id="runSelect" class="select"></select>
	            </label>
	          </div>
	          <nav class="navRow" aria-label="Run navigation">
	            <a class="btn btn--ghost" href="./index.html">Overview</a>
	            <a class="btn" href="./bracket.html">Bracket</a>
	            <a class="btn btn--ghost" href="./power.html">Power</a>
	            <a class="btn btn--ghost" id="downloadZip" href="#" download>Download data</a>
	          </nav>
	        </div>
      </div>
    </header>

    <main class="container main">
      <section class="panel" id="bracketviz">
        <div class="panel__header">
          <div>
            <h2 class="panel__title">Bracket</h2>
            <div class="subtle">Predicted winners highlighted.</div>
          </div>
        </div>

        <div class="bracketWrap">
          <div class="bracketSection" id="firstFour"></div>
          <div class="regionGrid" id="regionGrid"></div>
          <div class="bracketSection" id="finalFour"></div>
        </div>
      </section>

      <section class="panel" id="bracket">
        <div class="panel__header">
          <div>
            <h2 class="panel__title">Bracket predictions (table)</h2>
            <div class="subtle">Search and filter.</div>
          </div>
          <div class="panel__controls">
            <label class="field">
              <span class="field__label">Round</span>
              <select id="roundFilter" class="select"></select>
            </label>
            <label class="field">
              <span class="field__label">Search</span>
              <input id="bracketSearch" class="input" placeholder="e.g. Duke" />
            </label>
          </div>
        </div>
        <div class="tableWrap">
          <table class="table" id="bracketTable">
            <thead>
              <tr>
                <th data-key="round_order" data-type="number">#</th>
                <th data-key="round_name" data-type="string">Round</th>
                <th data-key="slot" data-type="string">Slot</th>
                <th data-key="team1" data-type="string">Team 1</th>
                <th data-key="team2" data-type="string">Team 2</th>
                <th data-key="team1_win_prob" data-type="number">P(Team 1)</th>
                <th data-key="winner" data-type="string">Winner</th>
                <th data-key="winner_prob" data-type="number">P(Winner)</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <footer class="footer">
        <div class="subtle">Open with a local web server for best results.</div>
      </footer>
    </main>

    <script src="./assets/app.js"></script>
  </body>
</html>
