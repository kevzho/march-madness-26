<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Power • March Madness Run</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="bg"></div>
    <header class="header">
      <div class="container header__inner">
        <div>
          <div class="kicker">March Madness • Elo Pipeline</div>
          <h1 class="title">Power ratings</h1>
          <div class="subtle" id="runMeta">Loading…</div>
        </div>
        <div class="header__actions">
          <a class="btn btn--ghost" href="./index.html">Overview</a>
          <a class="btn btn--ghost" href="./bracket.html">Bracket</a>
          <a class="btn" href="./power.html">Power</a>
          <a class="btn btn--ghost" id="downloadZip" href="#" download>Download data</a>
        </div>
      </div>
    </header>

    <main class="container main">
      <section class="panel" id="power">
        <div class="panel__header">
          <div>
            <h2 class="panel__title">Power ratings</h2>
            <div class="subtle">Sortable table with quick search.</div>
          </div>
          <div class="panel__controls">
            <label class="field">
              <span class="field__label">Search</span>
              <input id="powerSearch" class="input" placeholder="e.g. Arizona" />
            </label>
          </div>
        </div>
        <div class="tableWrap">
          <table class="table" id="powerTable">
            <thead>
              <tr>
                <th data-key="team" data-type="string">Team</th>
                <th data-key="region" data-type="string">Region</th>
                <th data-key="seed" data-type="number">Seed</th>
                <th data-key="wins" data-type="number">W</th>
                <th data-key="losses" data-type="number">L</th>
                <th data-key="net_rank" data-type="number">NET</th>
                <th data-key="power_score" data-type="number">Power</th>
                <th data-key="elo" data-type="number">Elo</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <footer class="footer">
        <div class="subtle">Open with a local web server for best results.</div>
      </footer>
    </main>

    <script src="./assets/app.js"></script>
  </body>
</html>
